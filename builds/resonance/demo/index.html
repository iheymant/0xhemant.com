<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resonance Demo</title>
    <link rel="stylesheet"
      href="/css/builds/resonance-css/resonance-demo.css" />
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <header id="header"></header>

    <main>

      <section class="resonance-demo container">

        <h1>Resonance V0.1.2</h1>

        <input
          class="audio-upload-input btn btn-secondary"
          type="file"
          accept="audio/*">

        <button
          class="analyze-audio-button btn btn-primary">
          Analyze Audio
        </button>

        <div
          class="analysis-status">
          Waiting for audio...
        </div>

        <div
          class="analysis-results">

          <canvas
            class="waveform-canvas"
            width="1000"
            height="300"></canvas>
        </div>

      </section>
      <section class="demo-info-section container">

        <div class="demo-info-container">

        </div>

      </section>
    </main>

    <div class="page-overlay"></div>
    <footer id="footer"></footer>

    <script type="module"
      src="/js/pages/builds/resonance/resonance-demo-page.js"></script>

  </body>
</html>
